<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VzSTORE | Painel Interno</title>
    <meta
      name="description"
      content="Painel interno para cadastro de produtos, estoque, pagamentos e atendimento."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../estilizacoes/styles.css" />
    <script defer src="../scripts/site.js"></script>

    <style>
      :root {
        --bg: #f3f3f3;
        --text: #121212;
        --muted: #555;
        --line: rgba(0, 0, 0, 0.12);
        --glass: rgba(255, 255, 255, 0.6);
        --glass-strong: rgba(255, 255, 255, 0.84);
        --dark: #0e0e0f;
        --white: #ffffff;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
      }

      body.menu-open {
        overflow: hidden;
      }

      a {
        color: inherit;
      }

      button {
        font: inherit;
      }

      .page {
        min-height: 100svh;
        position: relative;
      }

      /* =========================
         CABEÇALHO / TOPBAR
      ========================== */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 40;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        grid-template-areas: "brand spacer actions";
        align-items: center;
        gap: 12px clamp(16px, 2vw, 28px);
        padding: 12px clamp(18px, 4vw, 52px);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.78) 0%,
          rgba(255, 255, 255, 0.52) 100%
        );
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }

      .topbar__brand-group {
        grid-area: brand;
        min-width: 0;
        align-self: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        white-space: nowrap;
      }

      .brand__mark {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), transparent 35%),
          linear-gradient(135deg, #111 0%, #2b2b2b 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
        flex: 0 0 auto;
      }

      .brand__name {
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.98rem;
      }

      .topbar__actions {
        grid-area: actions;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: nowrap;
        min-width: 0;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 11px;
        border: 1.5px solid transparent;
        text-decoration: none;
        font-weight: 800;
        line-height: 1;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease,
          background 0.2s ease, color 0.2s ease;
        white-space: nowrap;
        box-shadow: none;
        cursor: pointer;
      }

      .btn:hover,
      .btn:focus-visible {
        transform: translateY(-1px);
      }

      .btn--solid {
        background: #111;
        color: #fff;
        border-color: #111;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      }

      .btn--solid:hover,
      .btn--solid:focus-visible {
        opacity: 0.94;
      }

      .btn--light {
        background: rgba(255, 255, 255, 0.72);
        color: #111;
        border-color: rgba(0, 0, 0, 0.65);
      }

      .btn--light:hover,
      .btn--light:focus-visible {
        background: rgba(255, 255, 255, 0.88);
      }

      .btn__icon {
        width: 18px;
        height: 18px;
        display: inline-flex;
        flex: 0 0 auto;
      }

      .btn__icon svg {
        width: 100%;
        height: 100%;
      }

      .topbar__menu-toggle {
        display: none;
        grid-area: menu;
        align-items: center;
        justify-content: center;
        width: 46px;
        height: 46px;
        border: 1.5px solid rgba(0, 0, 0, 0.18);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.78);
        color: #111;
        font-size: 1.2rem;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }

      .topbar__menu-toggle:hover,
      .topbar__menu-toggle:focus-visible {
        background: rgba(255, 255, 255, 0.92);
      }

      /* =========================
         SIDEBAR MOBILE
      ========================== */
      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.42);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.22s ease, visibility 0.22s ease;
        z-index: 70;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: min(84vw, 320px);
        height: 100dvh;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 18px 0 50px rgba(0, 0, 0, 0.16);
        transform: translateX(-105%);
        transition: transform 0.28s ease;
        z-index: 80;
        display: flex;
        flex-direction: column;
        padding: 18px;
      }

      .sidebar__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .sidebar__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }

      .brand__logo {
        width: 86px;
        height: auto;
        display: block;
      }

      .sidebar__close {
        width: 42px;
        height: 42px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        background: #fff;
        cursor: pointer;
        font-size: 1.15rem;
        font-weight: 800;
      }

      .sidebar__nav {
        display: grid;
        gap: 10px;
      }

      .sidebar__nav a {
        text-decoration: none;
        font-weight: 700;
        color: #111;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.04);
      }

      .sidebar__nav a:hover,
      .sidebar__nav a:focus-visible {
        background: rgba(0, 0, 0, 0.07);
      }

      .sidebar__divider {
        border: 0;
        height: 1px;
        background: rgba(0, 0, 0, 0.1);
        margin: 10px 0 4px;
      }

      .sidebar__actions {
        display: grid;
        gap: 10px;
        margin-top: 6px;
      }

      .sidebar__actions .btn {
        width: 100%;
      }

      .sidebar__footer {
        margin-top: auto;
        padding-top: 16px;
        font-size: 0.92rem;
        color: rgba(17, 17, 17, 0.72);
        line-height: 1.5;
      }

      .menu-open .sidebar {
        transform: translateX(0);
      }

      .menu-open .sidebar-overlay {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      /* =========================
         MAIN
      ========================== */
      .main {
        position: relative;
        padding-top: 60px;
      }

      .section {
        padding: 30px clamp(18px, 4vw, 56px);
      }

      .section__inner {
        max-width: 1280px;
        margin: 0 auto;
      }

      .section__head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      .section__head--stack {
        align-items: start;
        flex-direction: column;
      }

      .section__eyebrow {
        margin: 0 0 8px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(18, 18, 18, 0.72);
      }

      .section__dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #111;
      }

      .section__head h2 {
        margin: 0;
        font-size: clamp(1.6rem, 2.4vw, 2.2rem);
        letter-spacing: -0.04em;
      }

      .section__lead {
        margin: 0;
        max-width: 680px;
        color: rgba(18, 18, 18, 0.76);
        line-height: 1.55;
        font-size: 1.02rem;
      }

      .catalog-workspace {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 20px;
        align-items: start;
      }

      .catalog-rail {
        min-height: 420px;
        border: 1px dashed rgba(0, 0, 0, 0.12);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .catalog-rail__placeholder {
        min-height: 376px;
        border-radius: 18px;
        border: 1px dashed rgba(0, 0, 0, 0.14);
        display: grid;
        place-items: center;
        text-align: center;
        color: rgba(18, 18, 18, 0.72);
        background: rgba(255, 255, 255, 0.32);
        padding: 20px;
      }

      .catalog-cart-panel {
        min-height: 420px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .seller-shell {
        min-height: 376px;
        border-radius: 18px;
        border: 1px dashed rgba(0, 0, 0, 0.14);
        display: grid;
        place-items: center;
        text-align: center;
        color: rgba(18, 18, 18, 0.72);
        background: rgba(255, 255, 255, 0.32);
        padding: 20px;
      }

      /* =========================
         FOOTER
      ========================== */
      .footer {
        padding: 22px clamp(18px, 4vw, 56px) 18px;
        background: #111;
        color: rgba(255, 255, 255, 0.9);
        margin-top: 28px;
      }

      .footer__inner {
        max-width: 1280px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1.15fr 1fr;
        gap: 26px;
      }

      .footer__brand p {
        margin: 14px 0 0;
        max-width: 720px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.55;
      }

      .footer__columns {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 22px;
      }

      .footer__group h3 {
        margin: 0 0 14px;
        font-size: 1rem;
      }

      .footer__group a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.84);
        margin: 0 0 10px;
      }

      .footer__group p {
        margin: 10px 0 0;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.76);
      }

      .footer-link__icon {
        width: 18px;
        height: 18px;
        display: inline-flex;
      }

      .footer-link__icon svg {
        width: 100%;
        height: 100%;
      }

      .footer__small {
        max-width: 1280px;
        margin: 18px auto 0;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        gap: 16px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.92rem;
      }

      .footer__small a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.82);
      }

      /* =========================
         RESPONSIVO
      ========================== */
      @media (max-width: 1024px) {
        .footer__inner {
          grid-template-columns: 1fr;
        }

        .footer__columns {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .catalog-workspace {
          grid-template-columns: 1fr;
        }

        .catalog-cart-panel,
        .catalog-rail {
          min-height: 280px;
        }

        .seller-shell,
        .catalog-rail__placeholder {
          min-height: 236px;
        }
      }

      @media (max-width: 820px) {
        .topbar {
          grid-template-columns: 48px 1fr;
          grid-template-areas: "menu brand";
          align-items: center;
          gap: 10px;
          padding: 12px 14px;
        }

        .topbar__brand-group {
          justify-self: center;
          align-self: center;
        }

        .brand {
          justify-content: center;
        }

        .brand__mark {
          width: 38px;
          height: 38px;
        }

        .topbar__actions {
          display: none;
        }

        .topbar__menu-toggle {
          display: inline-flex;
        }

        .main {
          padding-top: 46px;
        }

        .section {
          padding: 18px 16px 44px;
        }

        .section__head {
          align-items: start;
          flex-direction: column;
        }

        .footer__columns {
          grid-template-columns: 1fr;
        }

        .footer__small {
          flex-direction: column;
        }
      }

      @media (max-width: 480px) {
        .btn {
          width: 100%;
          max-width: 320px;
        }

        .footer__small {
          gap: 10px;
        }
      }
    </style>
  </head>

  <body data-role="vendedora">
    <div class="page">
      <header class="topbar">
        <div class="topbar__brand-group">
          <button
            type="button"
            class="topbar__menu-toggle"
            id="menuToggle"
            data-sidebar-toggle
            aria-controls="seller-sidebar-menu"
            aria-expanded="false"
            aria-label="Abrir menu lateral"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 6h16" />
              <path d="M4 12h16" />
              <path d="M4 18h16" />
            </svg>
          </button>

          <a class="brand" href="index.html" aria-label="Página inicial">
            <span class="brand__mark" aria-hidden="true"></span>
            <span class="brand__name">VzSTORE</span>
          </a>
        </div>

        <div class="topbar__actions">
          <a class="btn btn--solid" href="index.html" title="Abrir loja pública">
            <span class="btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 6h15l-1.5 9h-13z" />
                <path d="M6 6 5 3H2" />
                <circle cx="9" cy="20" r="1.5" />
                <circle cx="18" cy="20" r="1.5" />
              </svg>
            </span>
            <span>Loja pública</span>
          </a>

          <button type="button" class="btn btn--light" data-action="logout">
            <span class="btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a5 5 0 0 0-5 5v1a5 5 0 0 0 10 0V7a5 5 0 0 0-5-5Z" />
                <path d="M4 20a8 8 0 0 1 16 0" />
              </svg>
            </span>
            <span>Sair</span>
          </button>
        </div>
      </header>

      <main class="main">
        <div data-seller-shell></div>
      </main>

      <footer class="footer">
        <div class="footer__inner">
          <div class="footer__brand">
            <a class="brand" href="index.html" aria-label="Página inicial">
              <span class="brand__mark" aria-hidden="true"></span>
              <span class="brand__name">VzSTORE</span>
            </a>
            <p>
              Espaço interno focado em operação. A área pública fica separada para a cliente navegar sem ruído.
            </p>
          </div>

          <div class="footer__columns">
            <div class="footer__group">
              <h3>Atalhos</h3>
              <a href="#painel">
                <span class="footer-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19V5" />
                    <path d="M8 19v-5" />
                    <path d="M12 19v-9" />
                    <path d="M16 19v-7" />
                    <path d="M20 19v-12" />
                  </svg>
                </span>
                <span>Painel interno</span>
              </a>
              <a href="#estoque">
                <span class="footer-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3 20 7v10l-8 4-8-4V7l8-4Z" />
                    <path d="M12 7v14" />
                    <path d="M4 7l8 4 8-4" />
                  </svg>
                </span>
                <span>Estoque</span>
              </a>
              <a href="#pedidos">
                <span class="footer-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="4" width="14" height="16" rx="2" />
                    <path d="M9 4.5V3h6v1.5" />
                    <path d="M9 10h6" />
                    <path d="M9 14h6" />
                  </svg>
                </span>
                <span>Pedidos</span>
              </a>
              <a href="#cadastros">
                <span class="footer-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 14a5 5 0 1 0-5-5 5 5 0 0 0 5 5Z" />
                    <path d="M4 20a8 8 0 0 1 16 0" />
                  </svg>
                </span>
                <span>Cadastros</span>
              </a>
              <a href="contato.html">
                <span class="footer-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4.5 6.5 8.5 4l2.4 3.9-1.7 1.6c1 2.1 2.6 3.7 4.7 4.7l1.6-1.7 3.9 2.4-2.5 4c-.4.7-1.2 1.1-2 1-6.6-.8-11.8-6-12.6-12.6-.1-.8.3-1.6 1-2Z" />
                  </svg>
                </span>
                <span>Contato</span>
              </a>
            </div>

            <div class="footer__group">
              <h3>Páginas</h3>
              <a href="catalogo.html">Catálogo</a>
              <a href="acesso.html">Acesso</a>
              <a href="index.html">Home</a>
            </div>

            <div class="footer__group">
              <h3>Voltar</h3>
              <a href="index.html">Resumo da loja</a>
              <a href="acesso.html" data-action="logout">Sair</a>
            </div>
          </div>
        </div>

        <div class="footer__small">
          <span>VzSTORE • Painel interno</span>
          <a href="#painel">Voltar ao topo</a>
        </div>
      </footer>
    </div>

  </body>
</html>
